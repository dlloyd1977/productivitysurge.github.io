<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
      <defs>
            <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#1FA086"/>
                  <stop offset="55%" stop-color="#157AA2"/>
                  <stop offset="100%" stop-color="#1C4B95"/>
            </linearGradient>
            <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#0E7B95"/>
                  <stop offset="100%" stop-color="#14497F"/>
            </linearGradient>
            <linearGradient id="pageSheen" x1="15%" y1="8%" x2="75%" y2="72%">
                  <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
                  <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>

            <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="190%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#000000" flood-opacity="0.24"/>
            </filter>
            <filter id="symbolShadow" x="-35%" y="-35%" width="190%" height="190%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="9" dy="8" stdDeviation="2.8" flood-color="#083763" flood-opacity="0.42"/>
            </filter>
            <filter id="ringShadow" x="-45%" y="-45%" width="210%" height="210%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="3" dy="4" stdDeviation="2.2" flood-color="#133C71" flood-opacity="0.34"/>
            </filter>
      </defs>

  <g id="layer-body">
    <ellipse cx="256" cy="456" rx="178" ry="13" fill="#000000" opacity="0.12"/>
    <path filter="url(#bodyShadow)"
          d="M96 36 h224 l96 96 v344 a32 32 0 0 1 -32 32 H128 a32 32 0 0 1 -32-32 V68 a32 32 0 0 1 32-32z"
          fill="url(#brandGrad)"/>
    <path d="M96 36 h224 l96 96 v344 a32 32 0 0 1 -32 32 H128 a32 32 0 0 1 -32-32 V68 a32 32 0 0 1 32-32z"
          fill="url(#pageSheen)"/>
  </g>

      <g id="layer-fold">
            <path d="M320 36 v58 a34 34 0 0 0 34 34 h62z" fill="url(#foldGrad)"/>
            <path d="M320 36 v58 a34 34 0 0 0 34 34" fill="none" stroke="#0B4B78" stroke-opacity="0.38" stroke-width="2"/>
      </g>

  <g id="layer-monogram" filter="url(#symbolShadow)">
    <text x="208" y="279" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="182" fill="#0E4A74" opacity="0.36">D</text>
    <text x="304" y="334" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="170" fill="#0E4A74" opacity="0.36"
          transform="rotate(2.2 304 334)">R</text>
    <text x="196" y="266" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="182" fill="#FFFFFF">D</text>
    <text x="294" y="321" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="170" fill="#FFFFFF"
          transform="rotate(2.2 294 321)">R</text>
  </g>

      <g id="layer-arrow" transform="translate(376, 404)" filter="url(#ringShadow)">
            <path d="M4-50 A56 56 0 1 1 -38.2-30.8"
                              fill="none" stroke="#0B3F6A" stroke-width="12" stroke-linecap="round" opacity="0.34"/>
            <polygon points="-47,-16 -17,-48 -12,-17" fill="#0B3F6A" opacity="0.34"/>
    <path d="M0-56 A56 56 0 1 1 -42.2-36.8"
          fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    <polygon points="-53,-21 -23,-53 -18,-22" fill="#FFFFFF"/>
    <circle cx="-47" cy="-24" r="3.6" fill="#FFFFFF" stroke="#A9C0DA" stroke-width="1.5"/>
  </g>
</svg>
