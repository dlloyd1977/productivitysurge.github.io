<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  font-family: 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif;
  background: linear-gradient(135deg, #0F6D57 0%, #113A7D 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  display: flex;
  align-items: center;
  gap: 60px;
  padding: 0 80px;
  width: 100%;
}
.logo-wrap {
  flex-shrink: 0;
}
.logo-wrap svg {
  width: 220px;
  height: 220px;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.3));
}
.text-side {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.brand-label {
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.product-name {
  font-size: 64px;
  font-weight: 800;
  color: #FFFFFF;
  line-height: 1.05;
  letter-spacing: -1px;
}
.tagline {
  font-size: 28px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  margin-top: 4px;
}
.features {
  display: flex;
  gap: 24px;
  margin-top: 20px;
}
.feature-pill {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 24px;
  padding: 8px 20px;
  font-size: 16px;
  font-weight: 600;
  color: #FFFFFF;
}
</style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="220" height="220">
        <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
          </linearGradient>
        </defs>
        <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bg)"/>
        <path d="M96 32 h224 l96 96 v352 a32 32 0 0 1 -32 32 H128 a32 32 0 0 1 -32-32 V64 a32 32 0 0 1 32-32z"
              fill="rgba(255,255,255,0.15)"/>
        <path d="M320 32 v64 a32 32 0 0 0 32 32 h64z"
              fill="rgba(255,255,255,0.1)"/>
        <text x="232" y="310" text-anchor="middle"
              font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
              font-weight="800" font-size="180" fill="#FFFFFF"
              letter-spacing="-4">Dr</text>
        <g transform="translate(370, 400)">
          <path d="M0-48 A48 48 0 1 1 -33.9-33.9"
                fill="none" stroke="#FFFFFF" stroke-width="10"
                stroke-linecap="round"/>
          <polygon points="-42,-22 -26,-42 -22,-26" fill="#FFFFFF"/>
        </g>
      </svg>
    </div>
    <div class="text-side">
      <div class="brand-label">ProductivitySurge</div>
      <div class="product-name">DocReclaimer</div>
      <div class="tagline">Rename smarter. Organize instantly.</div>
      <div class="features">
        <span class="feature-pill">OCR Extraction</span>
        <span class="feature-pill">AI-Powered</span>
        <span class="feature-pill">Batch Rename</span>
      </div>
    </div>
  </div>
</body>
</html>
