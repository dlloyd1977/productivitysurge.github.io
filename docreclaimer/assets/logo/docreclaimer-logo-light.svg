<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
      <defs>
            <linearGradient id="lightBody" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFFFFF"/>
                  <stop offset="100%" stop-color="#E8EEF7"/>
            </linearGradient>
            <linearGradient id="lightFold" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#D7E0EA"/>
                  <stop offset="100%" stop-color="#C4D0DE"/>
            </linearGradient>
            <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="190%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
            </filter>
            <filter id="symbolShadow" x="-35%" y="-35%" width="190%" height="190%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="7" dy="7" stdDeviation="2.4" flood-color="#0F3E66" flood-opacity="0.24"/>
            </filter>
            <filter id="ringShadow" x="-45%" y="-45%" width="210%" height="210%" color-interpolation-filters="sRGB">
                  <feDropShadow dx="3" dy="4" stdDeviation="2.0" flood-color="#5E7EA1" flood-opacity="0.28"/>
            </filter>
      </defs>

      <g id="layer-body">
            <ellipse cx="256" cy="456" rx="178" ry="13" fill="#000000" opacity="0.09"/>
            <path filter="url(#bodyShadow)"
                              d="M96 36 h224 l96 96 v344 a32 32 0 0 1 -32 32 H128 a32 32 0 0 1 -32-32 V68 a32 32 0 0 1 32-32z"
                              fill="url(#lightBody)"/>
      </g>

      <g id="layer-fold">
            <path d="M320 36 v58 a34 34 0 0 0 34 34 h62z" fill="url(#lightFold)"/>
      </g>

  <g id="layer-monogram" filter="url(#symbolShadow)">
    <text x="207" y="278" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="182" fill="#2D4F6B" opacity="0.22">D</text>
    <text x="303" y="333" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="170" fill="#2D4F6B" opacity="0.22"
          transform="rotate(2.2 303 333)">R</text>
    <text x="196" y="266" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="182" fill="#0F6D57">D</text>
    <text x="294" y="321" text-anchor="middle"
          font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif"
          font-weight="900" font-size="170" fill="#0F6D57"
          transform="rotate(2.2 294 321)">R</text>
  </g>

      <g id="layer-arrow" transform="translate(376, 404)" filter="url(#ringShadow)">
            <path d="M3-51 A56 56 0 1 1 -39.2-32.8"
                              fill="none" stroke="#315A78" stroke-width="12" stroke-linecap="round" opacity="0.28"/>
            <polygon points="-49,-18 -19,-50 -14,-19" fill="#315A78" opacity="0.28"/>
    <path d="M0-56 A56 56 0 1 1 -42.2-36.8"
